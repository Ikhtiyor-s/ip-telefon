;===============================================================================
; WELL-TECH SIP PJSIP KONFIGURATSIYA
; Autodialer Pro uchun professional sozlamalar
; Server: well-tech.sip.uz | Login: admin
;===============================================================================

;-------------------------------------------------------------------------------
; TRANSPORT - UDP
; Docker NAT uchun: ichkarida 5060, tashqarida 5061 (host port mapping)
;-------------------------------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=172.29.124.85
external_signaling_port=5061
external_media_address=172.29.124.85
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16

;-------------------------------------------------------------------------------
; WELL-TECH REGISTRATION
;-------------------------------------------------------------------------------
[sarkor]
type=registration
outbound_auth=sarkor-auth
server_uri=sip:well-tech.sip.uz
client_uri=sip:${ENV(SIP_USERNAME)}@well-tech.sip.uz
contact_user=${ENV(SIP_USERNAME)}
retry_interval=60
forbidden_retry_interval=300
expiration=300
auth_rejection_permanent=no

;-------------------------------------------------------------------------------
; WELL-TECH AUTH
;-------------------------------------------------------------------------------
[sarkor-auth]
type=auth
auth_type=userpass
username=${ENV(SIP_USERNAME)}
password=${ENV(SIP_PASSWORD)}
realm=well-tech.sip.uz

;-------------------------------------------------------------------------------
; WELL-TECH AOR (Address of Record)
;-------------------------------------------------------------------------------
[sarkor-aor]
type=aor
contact=sip:well-tech.sip.uz
qualify_frequency=60
qualify_timeout=5

;-------------------------------------------------------------------------------
; WELL-TECH ENDPOINT
;-------------------------------------------------------------------------------
[sarkor-endpoint]
type=endpoint
transport=transport-udp
context=autodialer-outbound
disallow=all
allow=alaw
allow=ulaw
allow=gsm
outbound_auth=sarkor-auth
aors=sarkor-aor
from_user=${ENV(SIP_USERNAME)}
from_domain=well-tech.sip.uz
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=no
dtmf_mode=rfc4733

;-------------------------------------------------------------------------------
; WELL-TECH IDENTIFY
;-------------------------------------------------------------------------------
[sarkor-identify]
type=identify
endpoint=sarkor-endpoint
match=81.95.224.170
match=well-tech.sip.uz
