;===============================================================================
; ASTERISK DIALPLAN - AUTODIALER PRO
; Professional qo'ng'iroq boshqaruvi
;===============================================================================

;-------------------------------------------------------------------------------
; GLOBAL O'ZGARUVCHILAR
;-------------------------------------------------------------------------------
[globals]
AUDIO_DIR=/tmp/autodialer-audio
MAX_WAIT=30
RECORD_DIR=/var/spool/asterisk/recording

;-------------------------------------------------------------------------------
; CHIQUVCHI QO'NG'IROQLAR - AUTODIALER
;-------------------------------------------------------------------------------
[autodialer-outbound]
; Autodialer orqali qo'ng'iroq qilish
exten => _X.,1,NoOp(=== AUTODIALER CHIQUVCHI: ${EXTEN} ===)
 same => n,Set(CALLERID(num)=+998783331002)
 same => n,Set(CALLERID(name)=WellTech)
 same => n,Set(CHANNEL(language)=uz)
 same => n,Set(CALL_START=${EPOCH})

 ; Qo'ng'iroq qilish
 same => n,Dial(PJSIP/${EXTEN}@sarkor-endpoint,${MAX_WAIT},g)
 same => n,Set(DIAL_STATUS=${DIALSTATUS})
 same => n,Set(CALL_DURATION=$[${EPOCH}-${CALL_START}])

 ; Natijani qayd qilish
 same => n,NoOp(=== QO'NG'IROQ NATIJASI: ${DIAL_STATUS} ===)
 same => n,NoOp(=== DAVOMIYLIGI: ${CALL_DURATION} soniya ===)

 ; AGI orqali natijani Python ga yuborish
 same => n,AGI(agi://127.0.0.1:4573/call_result,${DIAL_STATUS},${CALL_DURATION})
 same => n,Hangup()

;-------------------------------------------------------------------------------
; IVR - BUYURTMA XABARI
;-------------------------------------------------------------------------------
[autodialer-ivr]
exten => s,1,NoOp(=== IVR BOSHLANDI ===)
 same => n,Answer()
 same => n,Wait(1)

 ; Audio faylni ijro etish
 same => n,Set(AUDIO_FILE=${ARG1})
 same => n,Playback(${AUDIO_DIR}/${AUDIO_FILE})

 ; Takrorlash
 same => n,Wait(1)
 same => n,Playback(${AUDIO_DIR}/${AUDIO_FILE})

 same => n,Wait(2)
 same => n,Hangup()

;-------------------------------------------------------------------------------
; DINAMIK QO'NG'IROQ - AMI ORQALI
;-------------------------------------------------------------------------------
[autodialer-dynamic]
; AMI Originate: Exten=s
; Channel variables:
;   AUDIO_UZ      — o'zbekcha audio (to'liq URL yoki local path, extension'siz)
;   AUDIO_RU      — ruscha audio
;   AUDIO_FILE    — birlashgan uz+ru (fallback)
;   RECORDING_NAME — yozuv fayl nomi (bo'sh = yozmaydi)
;
; HTTP rejim (AUDIO_FILE http:// bilan boshlanib qolsa):
;   curl bilan /tmp/autodialer/ ga yuklanadi, keyin Playback qilinadi
exten => s,1,NoOp(=== DINAMIK QO'NG'IROQ: ${CALLERID(num)} ===)
 same => n,NoOp(=== UZ: ${AUDIO_UZ} | RU: ${AUDIO_RU} | COMBINED: ${AUDIO_FILE} ===)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Answer()
 same => n,Set(ANSWER_TIME=${EPOCH})
 ; Yozib olish
 same => n,ExecIf($["${RECORDING_NAME}" != ""]?MixMonitor(${RECORD_DIR}/${RECORDING_NAME}.wav))
 ; RTP ulanishi uchun kutish
 same => n,Wait(1)
 ; ===== HTTP REJIM: fayllarni yuklab olish =====
 same => n,GotoIf($["${AUDIO_FILE:0:4}" != "http"]?local_play)
 ; UZ yuklab olish
 same => n,System(mkdir -p /tmp/autodialer && curl -sf "${AUDIO_UZ}" -o /tmp/autodialer/uz_${UNIQUEID}.wav 2>/dev/null)
 same => n,System(curl -sf "${AUDIO_RU}" -o /tmp/autodialer/ru_${UNIQUEID}.wav 2>/dev/null)
 same => n,System(curl -sf "${AUDIO_FILE}" -o /tmp/autodialer/combined_${UNIQUEID}.wav 2>/dev/null)
 same => n,Set(LOCAL_UZ=/tmp/autodialer/uz_${UNIQUEID})
 same => n,Set(LOCAL_RU=/tmp/autodialer/ru_${UNIQUEID})
 same => n,Set(LOCAL_COMBINED=/tmp/autodialer/combined_${UNIQUEID})
 same => n,Goto(play_uz)
 ; ===== LOCAL REJIM: to'g'ridan-to'g'ri Playback =====
 same => n(local_play),Set(LOCAL_UZ=${AUDIO_UZ})
 same => n,Set(LOCAL_RU=${AUDIO_RU})
 same => n,Set(LOCAL_COMBINED=${AUDIO_FILE})
 ; ===== O'ZBEK TILI =====
 same => n(play_uz),GotoIf($["${LOCAL_UZ}" = ""]?fallback_combined)
 same => n,Playback(${LOCAL_UZ})
 same => n,NoOp(=== UZ holat: ${PLAYBACKSTATUS} ===)
 same => n,GotoIf($["${PLAYBACKSTATUS}" = "SUCCESS"]?play_ru)
 ; UZ topilmadi → birlashgan
 same => n(fallback_combined),Playback(${LOCAL_COMBINED})
 same => n,NoOp(=== Birlashgan holat: ${PLAYBACKSTATUS} ===)
 same => n,Goto(end_call)
 ; ===== RUS TILI =====
 same => n(play_ru),Wait(1)
 same => n,GotoIf($["${LOCAL_RU}" = ""]?end_call)
 same => n,Playback(${LOCAL_RU})
 same => n,NoOp(=== RU holat: ${PLAYBACKSTATUS} ===)
 ; ===== TUGATISH =====
 same => n(end_call),Wait(2)
 same => n,ExecIf($["${RECORDING_NAME}" != ""]?StopMixMonitor())
 ; Temp fayllarni tozalash (HTTP rejim)
 same => n,ExecIf($["${AUDIO_FILE:0:4}" = "http"]?System(rm -f /tmp/autodialer/*_${UNIQUEID}.wav))
 same => n,Set(CALL_DURATION=$[${EPOCH}-${CALL_START}])
 same => n,Set(TALK_DURATION=$[${EPOCH}-${ANSWER_TIME}])
 same => n,NoOp(=== JAMI: ${CALL_DURATION}s | GAPLASHISH: ${TALK_DURATION}s ===)
 same => n,Hangup()

; Javobsiz / muvaffaqiyatsiz
exten => failed,1,NoOp(=== QO'NG'IROQ MUVAFFAQIYATSIZ ===)
 same => n,Hangup()

;-------------------------------------------------------------------------------
; KIRUVCHI QO'NG'IROQLAR — SARKORDAN
;-------------------------------------------------------------------------------
; pjsip.conf da sarkor-endpoint ning context'ini "from-sarkor" ga o'zgartiring:
;   context=from-sarkor
[from-sarkor]
; Sarkordan kelgan kiruvchi qo'ng'iroqlar
exten => _X.,1,NoOp(=== KIRUVCHI SARKOR: ${CALLERID(num)} → ${EXTEN} ===)
 same => n,Set(CALL_START=${EPOCH})
 ; Yozib olish
 same => n,Set(REC_NAME=${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)}_in_${CALLERID(num)})
 same => n,MixMonitor(${RECORD_DIR}/${REC_NAME}.wav)
 ; Operatorga ulash — ichki raqam (PJSIP/100, PJSIP/101 va h.k.)
 ; DIAL_EXTEN ni kerakli ichki raqamga o'zgartiring
 same => n,Set(DIAL_EXTEN=${ENV(INCOMING_EXTEN)})
 same => n,GotoIf($["${DIAL_EXTEN}" = ""]?no_operator)
 same => n,Dial(PJSIP/${DIAL_EXTEN},30,rU(from-sarkor-ringback))
 same => n,Set(DIAL_STATUS=${DIALSTATUS})
 same => n,Goto(end)
 same => n(no_operator),NoOp(=== OPERATOR RAQAMI SOZLANMAGAN ===)
 same => n(end),StopMixMonitor()
 same => n,Set(CALL_DURATION=$[${EPOCH}-${CALL_START}])
 same => n,NoOp(=== KIRUVCHI TUGADI: ${DIAL_STATUS} | ${CALL_DURATION}s ===)
 same => n,Hangup()

;-------------------------------------------------------------------------------
; TEST CONTEXT
;-------------------------------------------------------------------------------
[autodialer-test]
exten => 100,1,NoOp(=== TEST QO'NG'IROQ ===)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

exten => 101,1,NoOp(=== ECHO TEST ===)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()
