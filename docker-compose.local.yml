# =============================================================================
# AUTODIALER PRO - LOKAL DOCKER COMPOSE (Windows)
# =============================================================================
# Ishga tushirish: docker-compose -f docker-compose.local.yml up -d
# To'xtatish:     docker-compose -f docker-compose.local.yml down
# Loglar:         docker logs autodialer-pro -f
# =============================================================================

services:
  # ===========================================================================
  # ASTERISK PBX
  # ===========================================================================
  asterisk:
    image: andrius/asterisk:latest
    container_name: autodialer-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5038:5038"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./config/asterisk/pjsip.local.conf:/etc/asterisk/pjsip.conf:ro
      - ./config/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./config/asterisk/manager.local.conf:/etc/asterisk/manager.conf:ro
      - autodialer-audio:/tmp/autodialer-audio
      - call-recordings:/var/spool/asterisk/recording
      - asterisk-logs:/var/log/asterisk
    env_file:
      - .env.local
    environment:
      - TZ=Asia/Tashkent
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show channels"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # AUTODIALER SERVICE
  # ===========================================================================
  autodialer:
    build:
      context: .
      dockerfile: Dockerfile
    image: autodialer-pro:latest
    container_name: autodialer-pro
    restart: unless-stopped
    depends_on:
      asterisk:
        condition: service_healthy
    ports:
      - "8585:8585"
    volumes:
      - autodialer-audio:/app/audio
      - call-recordings:/app/recordings
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env.local
    environment:
      - TZ=Asia/Tashkent

volumes:
  autodialer-audio:
  call-recordings:
  asterisk-logs:
