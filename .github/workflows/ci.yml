name: CI — Tests & Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Dependensiyalarni o'rnatish
        run: |
          pip install --upgrade pip
          pip install pytest aiohttp python-dotenv edge-tts gtts

      - name: Testlarni ishga tushirish
        run: pytest tests/ -v --tb=short
        env:
          EXTERNAL_API_SECRET: "ci-test-secret-key-minimum-32chars"
          WEBHOOK_SECRET: "ci-test-secret-key-minimum-32chars"

      - name: Xavfsizlik tekshiruvi — hardcoded credentials
        run: |
          echo "pjsip.conf tekshirilmoqda..."
          if grep -E "^(username|password)\s*=\s*[a-zA-Z0-9]{4,}$" config/asterisk/pjsip.conf; then
            echo "XATO: pjsip.conf da hardcoded credentials topildi!"
            exit 1
          fi
          echo "OK: Hardcoded credentials topilmadi"

      - name: .env fayllar git'da yo'qligini tekshirish
        run: |
          if git ls-files | grep -E "^\.env\.(production|local|secret)$"; then
            echo "XATO: .env fayli git'da!"
            exit 1
          fi
          echo "OK: .env fayllar git'da yo'q"
