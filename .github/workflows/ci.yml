name: CI — Testlar va Xavfsizlik

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. TUZILMA TEKSHIRUVI — majburiy fayllar va kataloglar mavjudmi
  # ─────────────────────────────────────────────────────────────────────
  structure:
    name: Tuzilma tekshiruvi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Majburiy fayllar mavjudmi
        run: |
          REQUIRED=(
            "src/autodialer.py"
            "src/api_server.py"
            "src/services/asterisk_service.py"
            "src/services/nonbor_service.py"
            "src/services/tts_service.py"
            "src/services/stats_service.py"
            "src/services/admin_call_service.py"
            "src/services/webhook_service.py"
            "config/asterisk/extensions.conf"
            "config/asterisk/pjsip.conf"
            "config/asterisk/manager.local.conf"
            "static/index.html"
            "Dockerfile"
            "docker-compose.yml"
            "docker-compose.local.yml"
            ".env.example"
          )
          FAIL=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Topilmadi: $f"
              FAIL=1
            else
              echo "✅ $f"
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Web dashboard HTML tekshiruvi
        run: |
          if ! grep -q "AutoDialer Pro" static/index.html; then
            echo "❌ static/index.html noto'g'ri kontent"
            exit 1
          fi
          if ! grep -q "apiFetch" static/index.html; then
            echo "❌ static/index.html API kodi yo'q"
            exit 1
          fi
          echo "✅ Web dashboard OK"

      - name: Dockerfile sintaksis
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true
          echo "✅ Dockerfile tekshirildi"

  # ─────────────────────────────────────────────────────────────────────
  # 2. TESTLAR
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Testlar (Python 3.11)
    runs-on: ubuntu-latest
    needs: structure

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: ffmpeg o'rnatish
        run: sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Dependensiyalar
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio aiohttp python-dotenv edge-tts gtts

      - name: Testlarni ishga tushirish
        run: pytest tests/ -v --tb=short -x
        env:
          NONBOR_BASE_URL: "https://test.nonbor.uz/api/v2"
          NONBOR_SECRET: "ci-test-nonbor-secret-key-minimum"
          TELEGRAM_BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          TELEGRAM_CHAT_ID: "-1001234567890"
          AMI_HOST: "127.0.0.1"
          AMI_PASSWORD: "ci-test-ami-password"
          API_SECRET_KEY: "ci-test-api-key-minimum-32-characters"
          EXTERNAL_API_SECRET: "ci-test-external-32-chars-long-key"
          WEBHOOK_SECRET: "ci-test-webhook-32-chars-long-key"
          SIP_USERNAME: "ci-test-user"
          SIP_PASSWORD: "ci-test-password"
          ASTERISK_SOUNDS_PATH: "/tmp/test-audio"
          ASTERISK_PLAYBACK_PATH: "/tmp/test-audio/cache"

      - name: Test hisoboti
        if: always()
        run: pytest tests/ --tb=no -q 2>&1 | tail -5

  # ─────────────────────────────────────────────────────────────────────
  # 3. XAVFSIZLIK
  # ─────────────────────────────────────────────────────────────────────
  security:
    name: Xavfsizlik tekshiruvi
    runs-on: ubuntu-latest
    needs: structure

    steps:
      - uses: actions/checkout@v4

      - name: pjsip.conf hardcoded credentials yo'qligi
        run: |
          echo "=== pjsip.conf tekshirilmoqda ==="
          if grep -E "^(username|password|contact_user|from_user)\s*=\s*[a-zA-Z0-9]{4,}$" \
               config/asterisk/pjsip.conf; then
            echo "❌ XATO: pjsip.conf da hardcoded credentials!"
            exit 1
          fi
          echo "✅ pjsip.conf ENV var ishlatmoqda"

      - name: Maxfiy .env fayllar git'da yo'qligi
        run: |
          SECRETS=(".env.production" ".env.prod" ".env.secret" "pjsip.local.conf")
          FAIL=0
          for s in "${SECRETS[@]}"; do
            if git ls-files | grep -qF "$s"; then
              echo "❌ XATO: $s git'da topildi!"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✅ Maxfiy fayllar git'da yo'q" || exit 1

      - name: Python fayllarida ochiq parol yo'qligi
        run: |
          python3 - << 'EOF'
          import re, sys
          from pathlib import Path

          SRC = Path("src")
          ALLOWED = {"nonbor-secret-key", "autodialer123", "your-", "test-", "<", "ci-"}
          PATTERN = re.compile(
              r'(?:password|secret)\s*=\s*["\']([a-zA-Z0-9!@#]{8,})["\']',
              re.IGNORECASE
          )
          errors = []
          for f in SRC.rglob("*.py"):
              content = f.read_text(errors="ignore")
              for m in PATTERN.finditer(content):
                  val = m.group(1)
                  if not any(a.lower() in val.lower() for a in ALLOWED):
                      line = content[:m.start()].count("\n") + 1
                      errors.append(f"{f}:{line} — {m.group()[:50]}")
          if errors:
              print("❌ Hardcoded credentials:")
              print("\n".join(errors))
              sys.exit(1)
          print("✅ Hardcoded credentials topilmadi")
          EOF

      - name: SSRF himoya mavjudmi
        run: |
          if ! grep -q "_is_safe_url" src/services/webhook_service.py; then
            echo "❌ SSRF himoya topilmadi!"
            exit 1
          fi
          echo "✅ SSRF himoya mavjud"

      - name: HMAC compare_digest ishlatilmoqda
        run: |
          if ! grep -q "compare_digest" src/api_server.py; then
            echo "❌ compare_digest topilmadi!"
            exit 1
          fi
          echo "✅ HMAC compare_digest mavjud"

      - name: Web dashboard XSS himoyasi
        run: |
          if ! grep -q "function esc(" static/index.html; then
            echo "❌ HTML escape funksiyasi topilmadi!"
            exit 1
          fi
          echo "✅ XSS himoya (esc funksiyasi) mavjud"

  # ─────────────────────────────────────────────────────────────────────
  # 4. DOCKER BUILD — prod uchun image yig'ilishini tekshirish
  # ─────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build tekshiruvi
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v4

      - name: Docker image yig'ish
        run: docker build -t autodialer-pro:ci-test .

      - name: Image hajmi
        run: docker image inspect autodialer-pro:ci-test --format='Image: {{.Size}} bytes'

      - name: Static fayllar image ichida bormi
        run: |
          docker run --rm autodialer-pro:ci-test ls /app/static/index.html \
            && echo "✅ static/index.html image ichida bor" \
            || (echo "❌ static/index.html image ichida yo'q!" && exit 1)
