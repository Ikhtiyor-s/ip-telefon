services:
  asterisk:
    image: andrius/asterisk:latest
    container_name: autodialer-asterisk
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./config/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./config/asterisk/manager.conf:/etc/asterisk/manager.conf:ro
      - autodialer-audio:/var/lib/asterisk/sounds/autodialer
    environment:
      - TZ=Asia/Tashkent
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show channels"]
      interval: 30s
      timeout: 10s
      retries: 3

  autodialer:
    build:
      context: .
      dockerfile: Dockerfile
    image: autodialer-pro:latest
    container_name: autodialer-pro
    restart: unless-stopped
    network_mode: host
    depends_on:
      asterisk:
        condition: service_healthy
    volumes:
      - autodialer-audio:/app/audio
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env.production

volumes:
  autodialer-audio:
