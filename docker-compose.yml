services:
  asterisk:
    image: andrius/asterisk:latest
    container_name: autodialer-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5038:5038"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./config/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./config/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./config/asterisk/manager.conf:/etc/asterisk/manager.conf:ro
      # Audio: autodialer yozadi → Asterisk o'qiydi (shared volume)
      - autodialer-audio:/var/lib/asterisk/sounds/autodialer
      # Yozuvlar: Asterisk yozadi → autodialer o'qiydi (shared volume)
      - call-recordings:/var/spool/asterisk/recording
    env_file:
      - .env.production
    environment:
      - TZ=Asia/Tashkent
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show channels"]
      interval: 30s
      timeout: 10s
      retries: 3

  autodialer:
    build:
      context: .
      dockerfile: Dockerfile
    image: autodialer-pro:latest
    container_name: autodialer-pro
    restart: unless-stopped
    ports:
      - "8585:8585"
    depends_on:
      asterisk:
        condition: service_healthy
    volumes:
      - autodialer-audio:/app/audio
      # Yozuvlar: Asterisk yozgan fayllarni autodialer API orqali uzatadi
      - call-recordings:/app/recordings
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  autodialer-audio:
  call-recordings:
